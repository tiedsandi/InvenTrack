services:
  app:
    build: .
    volumes:
      - .:/var/www
    depends_on:
      - db
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t"]
      interval: 5s
      timeout: 5s
      retries: 5

  node:
    image: node:20-alpine
    working_dir: /var/www
    volumes:
      - .:/var/www
    ports:
      - "5173:5173"
    command: sh -c "npm install --legacy-peer-deps && npm run dev -- --host"
    depends_on:
      - app

  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      app:
        condition: service_healthy
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: inventrack_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
